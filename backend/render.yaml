services:
  - type: web
    name: quickbite-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quickbite-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
databases:
  - name: quickbite-db
    databaseName: quickbite
    user: quickbite_user
